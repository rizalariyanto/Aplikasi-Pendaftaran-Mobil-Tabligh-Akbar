<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mobil Tabligh Akbar - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global export for Babel script
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs, writeBatch };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .dot-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const INITIAL_CARS = [
            { id: "1", name: "Mobil Kijang Biru", status: "Available", passengers: ["Mas Amin", "Agus Dg Bunga", "Uztad Syamsuddin", "Abd Azis Dg Tunru", "Uztad Ali", "Uztad Sigollo", "Mukhtar Nyampa", "Uztad Dg Tola"] },
            { id: "2", name: "Mobil Avanza Hitam", status: "Available", passengers: ["Rahman Dg Ngemba", "Haeruddin D' Nai", "Abd. Haris Dg Lau'", "Rustam D' Kalu'", "Ramli Dg Nojeng"] },
            { id: "3", name: "Mobil Mega Carry (KKI Ibrahim Bin Adam)", status: "Full", passengers: ["Rombongan KKI IBRAHIM BIN ADAM"] },
            { id: "4", name: "Mobil Spander", status: "Available", passengers: ["Ust Komari"] },
            { id: "5", name: "Mobil Ust. Ulla", status: "Full", passengers: ["Rombongan Ust. Ulla"] },
            { id: "6", name: "Mobil Jafar Emba", status: "Full", passengers: ["Rombongan Jafar Emba"] },
            { id: "7", name: "Mobil Muhajirin Ardan", status: "Full", passengers: ["Rombongan Muhajirin Ardan"] },
            { id: "8", name: "Mobil Wiz", status: "Full", passengers: ["Rombongan Wiz"] },
            { id: "9", name: "Mobil Xenia Situru", status: "Available", passengers: ["Ust Situru", "Dg Ngasih", "Andi Tajuddin", "Harpina", "Arsyad Itung", "Dg Ngugi"] },
            { id: "10", name: "Mobil Wuling Cortez (KKI Amru Bin Dinar 2)", status: "Full", passengers: ["Kaharuddin", "Ustd Sudarman", "Dahlan", "Armansyah", "Taslim", "Azka", "Durjansyah", "Herianto"] },
            { id: "11", name: "Mobil Avanza (Rahman Emba)", status: "Full", passengers: ["Rahman Emba", "Syahruni", "Haris Dg Lau", "Tati", "Rustam Dg Kalu", "Haeruddin Dg Nai", "Ramli Dg Nojeng"] },
        ];

        // Icons
        const CarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        );

        const UsersIcon = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [cars, setCars] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [isAddingPassenger, setIsAddingPassenger] = useState(null);
            const [newPassengerName, setNewPassengerName] = useState("");
            const [isAddingCar, setIsAddingCar] = useState(false);
            const [newCarName, setNewCarName] = useState("");

            // Memastikan data konfigurasi ada sebelum digunakan
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-tabligh-akbar';
            
            const getFirebaseConfig = () => {
                try {
                    return typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                } catch (e) {
                    console.error("Invalid Firebase Config", e);
                    return null;
                }
            };

            // 1. Initialize Firebase & Auth
            useEffect(() => {
                const config = getFirebaseConfig();
                if (!config) {
                    setError("Konfigurasi Cloud tidak ditemukan. Aplikasi berjalan dalam mode pratinjau.");
                    setCars(INITIAL_CARS);
                    setIsLoading(false);
                    return;
                }

                const checkSDK = setInterval(() => {
                    if (window.FirebaseSDK) {
                        clearInterval(checkSDK);
                        initFirebase(config);
                    }
                }, 100);

                return () => clearInterval(checkSDK);
            }, []);

            const initFirebase = async (config) => {
                try {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseSDK;
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (currUser) => {
                        setUser(currUser);
                    });
                } catch (err) {
                    setError("Gagal terhubung ke server. Silakan muat ulang halaman.");
                    setIsLoading(false);
                }
            };

            // 2. Data Synchronization
            useEffect(() => {
                if (!user || !window.FirebaseSDK) return;
                const { getFirestore, collection, onSnapshot, doc, writeBatch } = window.FirebaseSDK;
                const db = getFirestore();
                const carsCol = collection(db, 'artifacts', appId, 'public', 'data', 'cars');

                const unsubscribe = onSnapshot(carsCol, (snapshot) => {
                    const carData = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    
                    if (carData.length === 0 && isLoading) {
                        const batch = writeBatch(db);
                        INITIAL_CARS.forEach(car => {
                            const carRef = doc(carsCol, car.id);
                            batch.set(carRef, car);
                        });
                        batch.commit();
                    } else {
                        // Sort by name or ID to keep order consistent
                        setCars(carData.sort((a, b) => parseInt(a.id) - parseInt(b.id)));
                        setIsLoading(false);
                    }
                }, (err) => {
                    console.error("Firestore error:", err);
                    setError("Terjadi kesalahan saat mengambil data.");
                });

                return () => unsubscribe();
            }, [user]);

            const stats = useMemo(() => {
                const totalPassengers = cars.reduce((acc, car) => acc + (car.passengers?.length || 0), 0);
                const fullCars = cars.filter(car => car.status === "Full").length;
                return { totalPassengers, fullCars, totalCars: cars.length };
            }, [cars]);

            const filteredCars = cars.filter(car => 
                car.name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                car.passengers?.some(p => p.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            // Actions
            const toggleStatus = async (id, currentStatus) => {
                if (!user) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const carRef = doc(db, 'artifacts', appId, 'public', 'data', 'cars', id);
                await updateDoc(carRef, { status: currentStatus === "Full" ? "Available" : "Full" });
            };

            const addPassenger = async (carId) => {
                if (!newPassengerName.trim() || !user) return;
                const { getFirestore, doc, updateDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const car = cars.find(c => c.id === carId);
                const carRef = doc(db, 'artifacts', appId, 'public', 'data', 'cars', carId);
                await updateDoc(carRef, { 
                    passengers: [...(car.passengers || []), newPassengerName.trim()] 
                });
                setNewPassengerName("");
                setIsAddingPassenger(null);
            };

            const removePassenger = async (carId, index) => {
                if (!user) return;
                if (window.confirm("Hapus nama ini dari daftar?")) {
                    const { getFirestore, doc, updateDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    const car = cars.find(c => c.id === carId);
                    const newPassengers = car.passengers.filter((_, i) => i !== index);
                    const carRef = doc(db, 'artifacts', appId, 'public', 'data', 'cars', carId);
                    await updateDoc(carRef, { passengers: newPassengers });
                }
            };

            const addNewCar = async () => {
                if (!newCarName.trim() || !user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const newId = Date.now().toString();
                const carRef = doc(db, 'artifacts', appId, 'public', 'data', 'cars', newId);
                await setDoc(carRef, {
                    id: newId,
                    name: newCarName.trim(),
                    status: "Available",
                    passengers: []
                });
                setNewCarName("");
                setIsAddingCar(false);
            };

            const removeCar = async (id) => {
                if (!user) return;
                if (window.confirm("Hapus mobil ini untuk semua orang?")) {
                    const { getFirestore, doc, deleteDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    const carRef = doc(db, 'artifacts', appId, 'public', 'data', 'cars', id);
                    await deleteDoc(carRef);
                }
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-emerald-700 text-white p-6">
                        <div className="text-center max-w-sm">
                            <div className="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mx-auto mb-6"></div>
                            <h2 className="text-xl font-bold mb-2 tracking-wide uppercase">Sinkronisasi Data</h2>
                            <p className="text-emerald-100 text-sm opacity-80 leading-relaxed">
                                Mohon tunggu sebentar, kami sedang menghubungkan aplikasi ke penyimpanan pusat...
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    {/* Error Banner */}
                    {error && (
                        <div className="bg-amber-500 text-white text-xs font-bold text-center py-2 px-4 shadow-inner">
                            ⚠️ {error}
                        </div>
                    )}

                    <header className="bg-emerald-700 text-white pt-8 pb-16 px-4 shadow-lg relative overflow-hidden">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold mb-1">Tabligh Akbar Nasional</h1>
                                    <div className="flex items-center gap-2">
                                        <p className="opacity-90 text-sm md:text-base">Bulukumba • 16 Syawal 1447 H</p>
                                        <span className={`flex items-center gap-1.5 text-[10px] px-2 py-0.5 rounded-full border transition-all ${user ? 'bg-emerald-600/50 border-emerald-400 text-white' : 'bg-rose-600/50 border-rose-400 text-white'}`}>
                                            <span className={`w-1.5 h-1.5 rounded-full ${user ? 'bg-emerald-400 dot-pulse' : 'bg-rose-400'}`}></span>
                                            {user ? 'Cloud Aktif' : 'Offline'}
                                        </span>
                                    </div>
                                </div>
                                <div className="text-right hidden sm:block">
                                    <p className="font-semibold text-sm">5 April 2026 M</p>
                                    <p className="text-[10px] opacity-60 mt-1 uppercase tracking-tighter">Sync ID: {user?.uid?.substring(0, 6) || 'None'}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20 shadow-xl">
                                    <p className="text-[10px] uppercase opacity-70 font-bold tracking-widest mb-1">Mobil</p>
                                    <p className="text-2xl font-bold leading-none">{stats.totalCars}</p>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20 shadow-xl">
                                    <p className="text-[10px] uppercase opacity-70 font-bold tracking-widest mb-1">Daftar</p>
                                    <p className="text-2xl font-bold leading-none">{stats.totalPassengers}</p>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20 shadow-xl">
                                    <p className="text-[10px] uppercase opacity-70 font-bold tracking-widest mb-1">Penuh</p>
                                    <p className="text-2xl font-bold leading-none">{stats.fullCars}</p>
                                </div>
                            </div>
                        </div>
                        {/* Background Decor */}
                        <div className="absolute top-0 right-0 -translate-y-1/2 translate-x-1/2 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 -mt-8 relative z-20">
                        <div className="flex flex-col md:flex-row gap-4 mb-6">
                            <div className="flex-1 relative group">
                                <input 
                                    type="text" 
                                    placeholder="Cari mobil atau nama jamaah..."
                                    className="w-full px-6 py-4 rounded-2xl shadow-2xl outline-none focus:ring-4 focus:ring-emerald-500/20 border-2 border-transparent focus:border-emerald-500 transition-all text-slate-800 font-medium"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <div className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                </div>
                            </div>
                            <button 
                                onClick={() => setIsAddingCar(!isAddingCar)}
                                className="bg-emerald-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2 whitespace-nowrap"
                            >
                                {isAddingCar ? (
                                    <><span>×</span> Tutup</>
                                ) : (
                                    <><span>+</span> Mobil Baru</>
                                )}
                            </button>
                        </div>

                        {isAddingCar && (
                            <div className="bg-white p-6 rounded-3xl shadow-xl border border-emerald-100 mb-6 animate-in">
                                <h2 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <span className="p-2 bg-emerald-50 text-emerald-600 rounded-xl">
                                        <CarIcon />
                                    </span>
                                    Daftarkan Kendaraan Tambahan
                                </h2>
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <input 
                                        type="text" 
                                        className="flex-1 px-5 py-3 rounded-2xl border-2 border-slate-100 outline-none focus:border-emerald-500"
                                        placeholder="Ketik tipe mobil atau nama rombongan..."
                                        value={newCarName}
                                        onChange={(e) => setNewCarName(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && addNewCar()}
                                    />
                                    <button 
                                        onClick={addNewCar} 
                                        className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-200"
                                    >
                                        Publikasikan
                                    </button>
                                </div>
                                <p className="mt-3 text-[10px] text-slate-400 italic font-medium px-1">Mobil yang Anda tambahkan akan langsung terlihat oleh semua panitia di cloud.</p>
                            </div>
                        )}

                        <div className="space-y-5">
                            {filteredCars.map((car) => (
                                <div key={car.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden hover:border-emerald-200 transition-all duration-300">
                                    <div className="p-5 flex items-center justify-between border-b border-slate-50 bg-white">
                                        <div className="flex items-center gap-5">
                                            <div className={`p-4 rounded-[1.2rem] ${car.status === 'Full' ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                                <CarIcon />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 text-xl leading-none mb-2">{car.name}</h3>
                                                <div className="flex items-center gap-3">
                                                    <button 
                                                        onClick={() => toggleStatus(car.id, car.status)}
                                                        className={`text-[10px] px-3 py-1 rounded-full font-extrabold tracking-widest transition-all shadow-sm active:scale-90 ${car.status === 'Full' ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}
                                                    >
                                                        {car.status === 'Full' ? 'PENUH' : 'TERSEDIA'}
                                                    </button>
                                                    <span className="text-xs text-slate-400 font-bold flex items-center gap-1.5">
                                                        <UsersIcon size={14} /> {(car.passengers || []).length} Jamaah
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 pr-2">
                                            <button 
                                                onClick={() => removeCar(car.id)} 
                                                className="p-3 bg-slate-50 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-2xl transition-all text-xl font-light"
                                                title="Hapus Mobil"
                                            >
                                                ×
                                            </button>
                                        </div>
                                    </div>

                                    <div className="p-6 bg-slate-50/40">
                                        <div className="flex flex-wrap gap-3 mb-5">
                                            {(car.passengers || []).map((p, idx) => (
                                                <div key={idx} className="flex items-center gap-2 bg-white px-4 py-2.5 rounded-2xl border border-slate-200 text-sm shadow-sm group animate-in">
                                                    <span className="text-slate-700 font-semibold">{p}</span>
                                                    <button 
                                                        onClick={() => removePassenger(car.id, idx)} 
                                                        className="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"
                                                        title="Hapus Jamaah"
                                                    >
                                                        ×
                                                    </button>
                                                </div>
                                            ))}
                                            <button 
                                                onClick={() => setIsAddingPassenger(car.id)}
                                                className="px-4 py-2.5 rounded-2xl border-2 border-dashed border-slate-200 text-slate-400 text-sm font-bold hover:border-emerald-300 hover:text-emerald-600 transition-all active:scale-95 bg-white"
                                            >
                                                + Tambah Nama
                                            </button>
                                        </div>

                                        {isAddingPassenger === car.id && (
                                            <div className="flex gap-2 animate-in bg-white p-3 rounded-2xl shadow-lg border border-emerald-50">
                                                <input 
                                                    type="text" 
                                                    className="flex-1 px-4 py-2.5 rounded-xl border border-emerald-100 text-sm outline-none focus:ring-2 focus:ring-emerald-500/20 bg-slate-50"
                                                    placeholder="Nama jamaah..."
                                                    value={newPassengerName}
                                                    onChange={(e) => setNewPassengerName(e.target.value)}
                                                    onKeyDown={(e) => e.key === 'Enter' && addPassenger(car.id)}
                                                    autoFocus
                                                />
                                                <button 
                                                    onClick={() => addPassenger(car.id)} 
                                                    className="bg-emerald-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md shadow-emerald-200 active:scale-95 transition-all"
                                                >
                                                    Simpan
                                                </button>
                                                <button 
                                                    onClick={() => {setIsAddingPassenger(null); setNewPassengerName("");}} 
                                                    className="bg-slate-100 text-slate-500 px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition-all"
                                                >
                                                    Batal
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <div className="mt-12 mb-8 text-center">
                        <p className="text-[10px] text-slate-400 uppercase tracking-[0.3em] font-bold">Bulukumba • Tabligh Akbar 1447 H</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
