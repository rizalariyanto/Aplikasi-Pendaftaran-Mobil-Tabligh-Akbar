<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mobil Tabligh Akbar</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Icons as SVG Components
        const CarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        );

        const UsersIcon = ({size=24}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );

        const INITIAL_CARS = [
            { id: 1, name: "Mobil Kijang Biru", status: "Available", passengers: ["Mas Amin", "Agus Dg Bunga", "Uztad Syamsuddin", "Abd Azis Dg Tunru", "Uztad Ali", "Uztad Sigollo", "Mukhtar Nyampa", "Uztad Dg Tola"] },
            { id: 2, name: "Mobil Avanza Hitam", status: "Available", passengers: ["Rahman Dg Ngemba", "Haeruddin D' Nai", "Abd. Haris Dg Lau'", "Rustam D' Kalu'", "Ramli Dg Nojeng"] },
            { id: 3, name: "Mobil Mega Carry (KKI Ibrahim Bin Adam)", status: "Full", passengers: ["Rombongan KKI IBRAHIM BIN ADAM"] },
            { id: 4, name: "Mobil Spander", status: "Available", passengers: ["Ust Komari"] },
            { id: 5, name: "Mobil Ust. Ulla", status: "Full", passengers: ["Rombongan Ust. Ulla"] },
            { id: 6, name: "Mobil Jafar Emba", status: "Full", passengers: ["Rombongan Jafar Emba"] },
            { id: 7, name: "Mobil Muhajirin Ardan", status: "Full", passengers: ["Rombongan Muhajirin Ardan"] },
            { id: 8, name: "Mobil Wiz", status: "Full", passengers: ["Rombongan Wiz"] },
            { id: 9, name: "Mobil Xenia Situru", status: "Available", passengers: ["Ust Situru", "Dg Ngasih", "Andi Tajuddin", "Harpina", "Arsyad Itung", "Dg Ngugi"] },
            { id: 10, name: "Mobil Wuling Cortez (KKI Amru Bin Dinar 2)", status: "Full", passengers: ["Kaharuddin", "Ustd Sudarman", "Dahlan", "Armansyah", "Taslim", "Azka", "Durjansyah", "Herianto"] },
            { id: 11, name: "Mobil Avanza (Rahman Emba)", status: "Full", passengers: ["Rahman Emba", "Syahruni", "Haris Dg Lau", "Tati", "Rustam Dg Kalu", "Haeruddin Dg Nai", "Ramli Dg Nojeng"] },
        ];

        function App() {
            const [cars, setCars] = useState(INITIAL_CARS);
            const [searchTerm, setSearchTerm] = useState("");
            const [isAddingPassenger, setIsAddingPassenger] = useState(null);
            const [newPassengerName, setNewPassengerName] = useState("");
            const [isAddingCar, setIsAddingCar] = useState(false);
            const [newCarName, setNewCarName] = useState("");

            const stats = useMemo(() => {
                const totalPassengers = cars.reduce((acc, car) => acc + car.passengers.length, 0);
                const fullCars = cars.filter(car => car.status === "Full").length;
                return { totalPassengers, fullCars, totalCars: cars.length };
            }, [cars]);

            const filteredCars = cars.filter(car => 
                car.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                car.passengers.some(p => p.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const toggleStatus = (id) => {
                setCars(prev => prev.map(car => 
                    car.id === id ? { ...car, status: car.status === "Full" ? "Available" : "Full" } : car
                ));
            };

            const addPassenger = (carId) => {
                if (!newPassengerName.trim()) return;
                setCars(prev => prev.map(car => 
                    car.id === carId ? { ...car, passengers: [...car.passengers, newPassengerName.trim()] } : car
                ));
                setNewPassengerName("");
                setIsAddingPassenger(null);
            };

            const removePassenger = (carId, index) => {
                setCars(prev => prev.map(car => 
                    car.id === carId ? { ...car, passengers: car.passengers.filter((_, i) => i !== index) } : car
                ));
            };

            const addNewCar = () => {
                if (!newCarName.trim()) return;
                const newCar = { id: Date.now(), name: newCarName.trim(), status: "Available", passengers: [] };
                setCars(prev => [newCar, ...prev]);
                setNewCarName("");
                setIsAddingCar(false);
            };

            const removeCar = (id) => {
                if (window.confirm("Hapus mobil ini dari daftar?")) {
                    setCars(prev => prev.filter(car => car.id !== id));
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-emerald-700 text-white pt-8 pb-12 px-4 shadow-lg sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold mb-1">Tabligh Akbar Nasional</h1>
                                    <p className="opacity-90 flex items-center gap-2 text-sm md:text-base">Bulukumba • 16 Syawal 1447 H</p>
                                </div>
                                <div className="text-right hidden md:block">
                                    <p className="font-semibold text-sm">5 April 2026 M</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-white/10 backdrop-blur-md rounded-xl p-3 border border-white/20">
                                    <p className="text-[10px] uppercase opacity-80">Mobil</p>
                                    <p className="text-xl font-bold">{stats.totalCars}</p>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md rounded-xl p-3 border border-white/20">
                                    <p className="text-[10px] uppercase opacity-80">Penumpang</p>
                                    <p className="text-xl font-bold">{stats.totalPassengers}</p>
                                </div>
                                <div className="bg-white/10 backdrop-blur-md rounded-xl p-3 border border-white/20">
                                    <p className="text-[10px] uppercase opacity-80">Penuh</p>
                                    <p className="text-xl font-bold">{stats.fullCars}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 -mt-6">
                        <div className="flex flex-col md:flex-row gap-4 mb-6">
                            <input 
                                type="text" 
                                placeholder="Cari nama..."
                                className="flex-1 px-4 py-4 rounded-2xl shadow-xl outline-none focus:ring-2 focus:ring-emerald-500"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <button 
                                onClick={() => setIsAddingCar(!isAddingCar)}
                                className="bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-xl font-bold hover:bg-emerald-700 transition-all"
                            >
                                {isAddingCar ? 'Batal' : '+ Tambah Mobil'}
                            </button>
                        </div>

                        {isAddingCar && (
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-emerald-100 mb-6 animate-in">
                                <h2 className="font-bold text-slate-800 mb-4">Daftarkan Mobil Baru</h2>
                                <div className="flex gap-3">
                                    <input 
                                        type="text" 
                                        className="flex-1 px-4 py-3 rounded-xl border border-slate-200"
                                        placeholder="Nama Mobil..."
                                        value={newCarName}
                                        onChange={(e) => setNewCarName(e.target.value)}
                                    />
                                    <button onClick={addNewCar} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold">Simpan</button>
                                </div>
                            </div>
                        )}

                        <div className="space-y-4">
                            {filteredCars.map((car) => (
                                <div key={car.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 flex items-center justify-between border-b border-slate-50">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${car.status === 'Full' ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                <CarIcon />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800">{car.name}</h3>
                                                <div className="flex items-center gap-2 mt-0.5">
                                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold text-white ${car.status === 'Full' ? 'bg-rose-500' : 'bg-emerald-500'}`}>
                                                        {car.status === 'Full' ? 'PENUH' : 'TERSEDIA'}
                                                    </span>
                                                    <span className="text-xs text-slate-500">{car.passengers.length} Orang</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => toggleStatus(car.id)} className="p-2 text-slate-400 hover:text-emerald-600">
                                                {car.status === 'Full' ? '🔴' : '🟢'}
                                            </button>
                                            <button onClick={() => removeCar(car.id)} className="p-2 text-slate-300 hover:text-rose-500 text-xl">×</button>
                                        </div>
                                    </div>

                                    <div className="p-4 bg-slate-50/50">
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {car.passengers.map((p, idx) => (
                                                <div key={idx} className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-sm">
                                                    <span>{p}</span>
                                                    <button onClick={() => removePassenger(car.id, idx)} className="text-rose-300 hover:text-rose-500">×</button>
                                                </div>
                                            ))}
                                            <button 
                                                onClick={() => setIsAddingPassenger(car.id)}
                                                className="px-3 py-1.5 rounded-lg border border-dashed border-emerald-300 text-emerald-600 text-sm"
                                            >
                                                + Nama
                                            </button>
                                        </div>

                                        {isAddingPassenger === car.id && (
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text" 
                                                    className="flex-1 px-3 py-2 rounded-lg border border-emerald-300 text-sm"
                                                    placeholder="Nama Penumpang..."
                                                    value={newPassengerName}
                                                    onChange={(e) => setNewPassengerName(e.target.value)}
                                                    onKeyDown={(e) => e.key === 'Enter' && addPassenger(car.id)}
                                                />
                                                <button onClick={() => addPassenger(car.id)} className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm">OK</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
